version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assessment
      POSTGRES_PASSWORD: assessment
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessment -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    restart: always
    ports:
      - "8000:8000"
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/code/app
      - ./alembic:/code/alembic
      - ./tests:/code/tests
    build:
      context: .
      dockerfile: Dockerfile

volumes:
  postgres_data:
